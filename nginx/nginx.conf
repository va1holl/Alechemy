# =============================================================================
# Nginx Main Configuration for Alechemy
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Real IP from trusted proxies (Docker network, load balancers)
    # Adjust these ranges based on your infrastructure
    set_real_ip_from 172.16.0.0/12;    # Docker default bridge
    set_real_ip_from 10.0.0.0/8;       # Private networks (k8s, AWS VPC, etc.)
    set_real_ip_from 192.168.0.0/16;   # Private networks
    set_real_ip_from 127.0.0.1;        # Localhost
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # Note: Security headers (X-Frame-Options, X-Content-Type-Options, CSP, etc.)
    # are set by Django middleware to avoid duplication and conflicts

    # Hide nginx version
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Include server configs
    include /etc/nginx/conf.d/*.conf;
}

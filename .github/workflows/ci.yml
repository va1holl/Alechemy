name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ===========================================================================
  # Lint and Format Check
  # ===========================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort

      - name: Check formatting with Black
        run: black --check --diff .

      - name: Check import sorting with isort
        run: isort --check-only --diff .

      - name: Lint with Ruff
        run: ruff check .

  # ===========================================================================
  # Tests
  # ===========================================================================
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: alechemy
          POSTGRES_PASSWORD: alechemy
          POSTGRES_DB: alechemy_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django coverage

      - name: Run Django system checks
        env:
          DEBUG: 'True'
          DJANGO_SECRET_KEY: 'test-secret-key-for-ci'
          DB_ENGINE: 'django.db.backends.postgresql'
          DB_NAME: 'alechemy_test'
          DB_USER: 'alechemy'
          DB_PASSWORD: 'alechemy'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
        run: python manage.py check

      - name: Run migrations
        env:
          DEBUG: 'True'
          DJANGO_SECRET_KEY: 'test-secret-key-for-ci'
          DB_ENGINE: 'django.db.backends.postgresql'
          DB_NAME: 'alechemy_test'
          DB_USER: 'alechemy'
          DB_PASSWORD: 'alechemy'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
        run: python manage.py migrate

      - name: Run tests with coverage
        env:
          DEBUG: 'True'
          DJANGO_SECRET_KEY: 'test-secret-key-for-ci'
          DB_ENGINE: 'django.db.backends.postgresql'
          DB_NAME: 'alechemy_test'
          DB_USER: 'alechemy'
          DB_PASSWORD: 'alechemy'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
        run: |
          coverage run --source='.' manage.py test
          coverage report --fail-under=50

  # ===========================================================================
  # Security Check (Production settings)
  # ===========================================================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety pip-audit

      - name: Run Django deploy checks
        env:
          DEBUG: 'False'
          DJANGO_SECRET_KEY: 'test-secret-key-for-ci-deploy-check'
          ALLOWED_HOSTS: 'localhost'
        run: python manage.py check --deploy --fail-level WARNING || true

      - name: Check for known vulnerabilities in dependencies
        run: pip-audit --strict || true

  # ===========================================================================
  # Build Docker Image (optional, for main branch)
  # ===========================================================================
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: alechemy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

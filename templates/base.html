<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Alechmy{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<header>
  <nav>
    <a href="{% url 'pages:home' %}">Главная</a>

    {% if request.user.is_authenticated %}
      |
      <a href="{% url 'pages:me' %}">Мой профиль</a>
      |
      <a href="{% url 'events:scenario_list' %}">Сценарии</a>
      |
      <a href="{% url 'events:event_list' %}">Мои события</a>
      |
      <a href="{% url 'events:diary_list' %}">Алко-дневник</a>

      |
      <form action="{% url 'accounts:logout' %}" method="post" style="display:inline">
        {% csrf_token %}
        <button type="submit">Выйти</button>
      </form>
    {% else %}
      |
      <a href="{% url 'accounts:login' %}">Войти</a>
      |
      <a href="{% url 'accounts:signup' %}">Регистрация</a>
    {% endif %}
  </nav>

  {% if messages %}
    <ul>
      {% for m in messages %}
        <li>{{ m }}</li>
      {% endfor %}
    </ul>
  {% endif %}
</header>

<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>

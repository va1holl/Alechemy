<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>500 — Alechemy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #030604;
      color: #e6efe8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .error-container {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .error-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: rgba(255,59,48,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,59,48,0.2);
    }
    .error-icon span {
      font-size: 56px;
      line-height: 1;
    }
    .error-code {
      font-size: 96px;
      font-weight: 700;
      color: #FF3B30;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -2px;
    }
    .error-title {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 12px;
    }
    .error-text {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .error-btn-primary {
      background: #34A853;
      color: #ffffff;
    }
    .error-btn-primary:hover {
      background: #2d9046;
      transform: translateY(-2px);
    }
    .error-btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .error-btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }
    .error-btn svg {
      width: 18px;
      height: 18px;
    }
    @media (max-width: 480px) {
      .error-code { font-size: 72px; }
      .error-title { font-size: 20px; }
      .error-text { font-size: 14px; }
      .error-icon { width: 96px; height: 96px; }
      .error-icon span { font-size: 44px; }
      .error-actions { flex-direction: column; }
      .error-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon"><span>🔧</span></div>
    <div class="error-code">500</div>
    <h1 class="error-title">Помилка сервера</h1>
    <p class="error-text">Щось пішло не так на нашому боці. Ми вже працюємо над виправленням. Спробуйте пізніше.</p>
    <div class="error-actions">
      <a href="/" class="error-btn error-btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        На головну
      </a>
      <a href="javascript:history.back()" class="error-btn error-btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Повернутись
      </a>
    </div>
  </div>
</body>
</html>

{% load static i18n %}

<!-- Mobile Bottom Navigation -->
<nav class="mobile-nav">
  <a class="mobile-nav__item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'pages:dashboard' %}">
    <svg fill="none" viewBox="0 0 22 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M1.57 22.44H7.37V14.52c0-.36.12-.66.36-.9.24-.24.54-.36.9-.36h4.71c.36 0 .67.12.91.36.24.24.36.53.36.9v7.92h5.8V8.88c0-.16-.03-.3-.1-.43a.94.94 0 0 0-.29-.34L11.58 1.77a.9.9 0 0 0-.58-.21.9.9 0 0 0-.57.21L1.96 8.1a.94.94 0 0 0-.29.34c-.07.13-.1.28-.1.44V22.44Z" fill="currentColor"/>
    </svg>
    <span>{% trans "Головна" %}</span>
  </a>
  
  <a class="mobile-nav__item {% if 'event' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'events:event_list' %}">
    <svg fill="none" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(3,3)" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.88" fill="none">
        <path d="M9.66.94c-.49.4-.81.97-.91 1.59a2 2 0 0 1-.25.53c-.12.16-.28.29-.45.38l-.99.48a5.96 5.96 0 0 0-2.06 1.61c-1.75 2.1-1.75 3.04-1.75 6.6 0 1.61-1.7 3.07-2.15 4.52-.28.86-.43 2.81 1.84 2.81h16.97c.33.01.66-.06.96-.22.3-.15.55-.37.74-.64.19-.27.32-.58.36-.9a2 2 0 0 0-.16-1.1c-.45-1.36-2.24-2.98-2.24-4.6V9.45"/>
        <path d="M15.49 19.44c.01.53-.07 1.06-.29 1.56-.21.49-.52.94-.9 1.32-.38.38-.83.68-1.33.88-.5.2-1.04.3-1.58.29a3.9 3.9 0 0 1-3.05-2.52 3.8 3.8 0 0 1-.29-1.55"/>
        <circle cx="15.49" cy="4.06" r="3.12"/>
      </g>
    </svg>
    <span>{% trans "Події" %}</span>
  </a>
  
  <a class="mobile-nav__item mobile-nav__item--create {% if 'scenario' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'events:scenario_list' %}">
    <div class="mobile-nav__create-btn">
      <svg fill="none" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 6.5v13" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
        <path d="M6.5 13h13" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <span>{% trans "Створити" %}</span>
  </a>
  
  <a class="mobile-nav__item {% if 'shopping' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'shopping:my_lists' %}">
    <svg fill="none" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(1,2)" stroke="currentColor" stroke-linejoin="round" stroke-width="1.88" fill="none">
        <path d="M2.31 9.55a1.2 1.2 0 0 0-1.32 1.36l3.48 12.27a2.6 2.6 0 0 0 2.63 2h15.67c.59 0 1.17-.19 1.63-.54.46-.36.8-.85.97-1.4l3.48-12.27c.1-.34.04-.72-.15-1.01a1.2 1.2 0 0 0-.94-.47H2.31Z"/>
        <path d="m8.48 9.55 6.46-8.62 6.46 8.62"/>
      </g>
    </svg>
    <span>{% trans "Списки" %}</span>
  </a>
  
  <button class="mobile-nav__item mobile-nav__more" id="mobile-nav-more" type="button">
    <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="5" r="2" fill="currentColor"/>
      <circle cx="12" cy="12" r="2" fill="currentColor"/>
      <circle cx="12" cy="19" r="2" fill="currentColor"/>
    </svg>
    <span>{% trans "Ще" %}</span>
  </button>
</nav>

<!-- Mobile More Menu (Drawer) -->
<div class="mobile-drawer" id="mobile-drawer">
  <div class="mobile-drawer__overlay" id="mobile-drawer-overlay"></div>
  <div class="mobile-drawer__content">
    <div class="mobile-drawer__header">
      <img src="{% static 'img/alechemy_logosmall.png' %}" alt="Alechemy" class="mobile-drawer__logo">
      <button class="mobile-drawer__close" id="mobile-drawer-close">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    
    <div class="mobile-drawer__menu">
      <a class="mobile-drawer__item" href="{% url 'pages:calculator' %}">
        <svg fill="none" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
          <rect width="22.5" height="27.5" x="3.75" y="1.25" stroke="currentColor" stroke-width="2.5" rx="3.75"/>
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6.25 6.25H16.25M16.25 16.25V21.25M16.25 11.25H16.26M11.25 11.25H11.26M6.25 11.25H6.26M11.25 16.25H11.26M6.25 16.25H6.26M11.25 21.25H11.26M6.25 21.25H6.26"/>
        </svg>
        <span>{% trans "Калькулятор" %}</span>
      </a>
      
      <a class="mobile-drawer__item" href="{% url 'events:diary_list' %}">
        <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 7h8M8 11h8M8 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>{% trans "Щоденник" %}</span>
      </a>
      
      <a class="mobile-drawer__item" href="{% url 'places:map' %}">
        <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>{% trans "Карта" %}</span>
      </a>
      
      <a class="mobile-drawer__item" href="{% url 'pages:notifications' %}">
        <svg fill="none" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
          <path d="M22.5 10c0-2.1-.82-4.1-2.3-5.58A7.5 7.5 0 0 0 15 2.5a7.5 7.5 0 0 0-5.2 2.08A8.1 8.1 0 0 0 7.5 10c0 8.75-3.75 11.25-3.75 11.25h22.5S22.5 18.75 22.5 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M17.16 26.25a2.5 2.5 0 0 1-4.32 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>{% trans "Сповіщення" %}</span>
      </a>
      
      <div class="mobile-drawer__divider"></div>
      
      <a class="mobile-drawer__item mobile-drawer__item--premium" href="{% url 'pages:plan_choice' %}">
        <svg fill="none" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
          <path d="M15 2L18.09 11.26L28 11.26L20.45 17.02L23.54 26.28L15 20.52L6.46 26.28L9.55 17.02L2 11.26L11.91 11.26L15 2Z" fill="#FFD700" stroke="#FFD700" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span>Premium</span>
      </a>
      
      <a class="mobile-drawer__item" href="{% url 'pages:me' %}">
        <svg fill="none" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
          <path d="M7.74 21.86a15.4 15.4 0 0 1 4.6-1.81c2.34-.6 4.74-.6 7.08 0a15.4 15.4 0 0 1 4.6 1.8 9.9 9.9 0 0 0 2-3.06A10 10 0 0 0 25 15c0-2.77-.97-5.13-2.92-7.07A9.96 9.96 0 0 0 15 5a9.96 9.96 0 0 0-7.07 2.93A9.96 9.96 0 0 0 5 15c0 1.39.25 2.72.74 3.99a10 10 0 0 0 2 3.07Zm7.26-6.23c-1.05 0-1.94-.36-2.67-1.09a3.77 3.77 0 0 1-1.09-2.68c0-1.05.36-1.94 1.09-2.67A3.77 3.77 0 0 1 15 8.13c1.05 0 1.94.36 2.67 1.09.73.73 1.1 1.62 1.1 2.67 0 1.05-.37 1.95-1.1 2.68A3.77 3.77 0 0 1 15 15.63Z" fill="currentColor"/>
        </svg>
        <span>{% trans "Профіль" %}</span>
      </a>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const moreBtn = document.getElementById('mobile-nav-more');
  const drawer = document.getElementById('mobile-drawer');
  const overlay = document.getElementById('mobile-drawer-overlay');
  const closeBtn = document.getElementById('mobile-drawer-close');
  
  function openDrawer() {
    drawer.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  
  function closeDrawer() {
    drawer.classList.remove('open');
    document.body.style.overflow = '';
  }
  
  if (moreBtn) moreBtn.addEventListener('click', openDrawer);
  if (overlay) overlay.addEventListener('click', closeDrawer);
  if (closeBtn) closeBtn.addEventListener('click', closeDrawer);
});
</script>

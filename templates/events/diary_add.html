{% extends "base.html" %}

{% block title %}Добавить запись в алко-дневник — Alechmy{% endblock %}

{% block content %}
  <h1>Добавить запись в алко-дневник</h1>

  {% if event %}
    <p>Событие: {{ event.scenario.name }} — {{ event.date }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
  </form>

  <p><a href="{% url 'events:diary_list' %}">К дневнику</a></p>
{% endblock %}

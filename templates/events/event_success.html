{% load static %}
<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Захід створено — Alechemy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
  <style nonce="{{ csp_nonce }}">
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Montserrat',sans-serif; width:100vw; height:100vh; overflow:hidden; }
    .container { width:100%; height:100%; background: radial-gradient(ellipse at top right, rgba(255,255,255,1) 3.4613%, rgba(210,255,225,1) 5.8419%, rgba(165,255,195,1) 8.2225%, rgba(142,255,169,1) 12.832%, rgba(113,244,151,1) 14.77%, rgba(84,234,133,1) 16.708%, rgba(55,223,115,1) 18.645%, rgba(26,213,98,1) 20.583%, rgba(24,167,76,1) 30.953%, rgba(18,125,57,1) 39.833%, rgba(12,84,38,1) 48.713%, rgba(9,63,29,1) 53.153%, rgba(6,42,19,1) 57.593%, rgba(3,21,10,1) 62.033%, rgba(1,10,5,1) 64.254%, rgba(0,0,0,1) 66.474%);
      display:flex; align-items:center; justify-content:center; position:relative; }
    .page-title { position:absolute; top:45px; left:50%; transform:translateX(-50%); font-family:'Poppins',sans-serif; font-weight:700; font-size:24px; color:#34a853; text-align:center; }
    .card { width:1084px; background:rgba(52,168,83,0.2); border:5px solid rgba(255,255,255,0.2); border-radius:50px; box-shadow:0 4px 4px rgba(0,0,0,0.25); padding:50px 96px; display:flex; align-items:center; justify-content:center; }
    .content { width:892px; display:flex; flex-direction:column; align-items:center; gap:30px; }
    .logo { width:204px; height:auto; display:block; }
    .text-section { display:flex; flex-direction:column; gap:20px; align-items:center; text-align:center; }
    .main-title { font-family:'Poppins',sans-serif; font-weight:700; font-size:48px; line-height:1.3; letter-spacing:-0.48px; color:white; }
    .subtitle { font-family:'Montserrat',sans-serif; font-weight:500; font-size:24px; line-height:1.2; color:white; max-width:582px; }
    .view-btn { width:100%; height:56px; background:black; border:none; border-radius:50px; color:white; font-family:'Montserrat',sans-serif; font-weight:600; font-size:16px; cursor:pointer; transition:background .3s; }
    .view-btn:hover { background:#1a1a1a; }
    
    /* Mobile */
    @media (max-width: 768px) {
      .card { width:90%; padding:30px 24px; border-radius:30px; border-width:3px; }
      .content { width:100%; }
      .logo { width:120px; }
      .main-title { font-size:28px; }
      .subtitle { font-size:16px; }
      .view-btn { height:48px; font-size:14px; }
      .page-title { font-size:20px; top:24px; }
    }
    
    @media (max-width: 480px) {
      .card { padding:24px 16px; }
      .main-title { font-size:24px; }
      .subtitle { font-size:14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="page-title">Створити подію</h1>
    <div class="card">
      <div class="content">
        <img src="{% static 'img/logo-green.png' %}" alt="Alechemy logo" class="logo" />
        <div class="text-section">
          <h2 class="main-title">Захід успішно створено</h2>
          <p class="subtitle">Вітаємо! Ваш захід був успішно створений. Перегляньте зустріч на головній сторінці.</p>
          <button class="view-btn" onclick="window.location.href='{% url 'pages:home' %}'">Переглянути</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

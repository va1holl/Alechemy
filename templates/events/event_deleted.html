{% load static %}
{% load i18n %}
<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% trans "Подію видалено" %} — Alechemy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
  <style nonce="{{ csp_nonce }}">
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Montserrat',sans-serif; width:100vw; height:100vh; overflow:hidden; }
    .container { width:100%; height:100%; background: radial-gradient(ellipse at top right, rgba(255,255,255,1) 3.46%, rgba(255,220,210,1) 5.84%, rgba(255,195,180,1) 8.22%, rgba(255,169,155,1) 12.83%, rgba(244,151,140,1) 14.77%, rgba(234,133,120,1) 16.71%, rgba(223,115,100,1) 18.65%, rgba(213,98,80,1) 20.58%, rgba(167,76,60,1) 30.95%, rgba(125,57,45,1) 39.83%, rgba(84,38,30,1) 48.71%, rgba(63,29,22,1) 53.15%, rgba(42,19,15,1) 57.59%, rgba(21,10,8,1) 62.03%, rgba(10,5,4,1) 64.25%, rgba(0,0,0,1) 66.47%);
      display:flex; align-items:center; justify-content:center; position:relative; }
    .page-title { position:absolute; top:45px; left:50%; transform:translateX(-50%); font-family:'Poppins',sans-serif; font-weight:700; font-size:24px; color:#e05555; text-align:center; }
    .card { width:1084px; background:rgba(224,85,85,0.15); border:5px solid rgba(255,255,255,0.2); border-radius:50px; box-shadow:0 4px 4px rgba(0,0,0,0.25); padding:50px 96px; display:flex; align-items:center; justify-content:center; }
    .content { width:892px; display:flex; flex-direction:column; align-items:center; gap:30px; }
    .logo { width:204px; height:auto; display:block; }
    .text-section { display:flex; flex-direction:column; gap:20px; align-items:center; text-align:center; }
    .main-title { font-family:'Poppins',sans-serif; font-weight:700; font-size:48px; line-height:1.3; letter-spacing:-0.48px; color:white; }
    .subtitle { font-family:'Montserrat',sans-serif; font-weight:500; font-size:24px; line-height:1.2; color:white; max-width:582px; }
    .view-btn { width:100%; height:56px; background:black; border:none; border-radius:50px; color:white; font-family:'Montserrat',sans-serif; font-weight:600; font-size:16px; cursor:pointer; transition:background .3s; text-decoration:none; display:flex; align-items:center; justify-content:center; }
    .view-btn:hover { background:#1a1a1a; }

    @media (max-width: 768px) {
      .card { width:90%; padding:30px 24px; border-radius:30px; border-width:3px; }
      .content { width:100%; }
      .logo { width:120px; }
      .main-title { font-size:28px; }
      .subtitle { font-size:16px; }
      .view-btn { height:48px; font-size:14px; }
      .page-title { font-size:20px; top:24px; }
    }

    @media (max-width: 480px) {
      .card { padding:24px 16px; }
      .main-title { font-size:24px; }
      .subtitle { font-size:14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="page-title">Alechemy</h1>
    <div class="card">
      <div class="content">
        <img src="{% static 'img/logo-green.png' %}" alt="Alechemy logo" class="logo" />
        <div class="text-section">
          <h2 class="main-title">{% trans "Подію видалено" %}</h2>
          <p class="subtitle">{% trans "Подію було успішно видалено. Ви можете повернутися до списку своїх подій." %}</p>
          <a class="view-btn" href="{% url 'events:event_list' %}">{% trans "До моїх подій" %}</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

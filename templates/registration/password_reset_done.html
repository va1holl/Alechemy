{% load static i18n %}
<!doctype html>
<html lang="uk">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Alechemy | Reset Sent</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'css/auth.css' %}" />
</head>
<body>
	<div class="bg" aria-hidden="true"></div>

	<main class="page">
		<section class="card card-top" data-name="Reset Sent">
			<div class="container">
				<div class="center" style="display:flex; flex-direction:column; gap:18px; width:100%;">
					  <img src="{% static 'img/logo-green.png' %}" alt="Alechemy logo" width="120" height="120" style="display:block; margin:0 auto;" />
					<p class="title" style="text-align:center;">{% trans "Інструкція відправлена" %}</p>
					<p class="subtitle" style="text-align:center;">{% trans "Ми надіслали лист із посиланням для скидання пароля. Перевірте пошту." %}</p>
					<a class="btn btn-primary" href="{% url 'accounts:login' %}" style="max-width:320px; align-self:center;">{% trans "Увійти" %}</a>
				</div>
			</div>
		</section>
	</main>

	<script src="{% static 'js/auth.js' %}"></script>
</body>
</html>

{% load static %}
{% load i18n %}
<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alechemy | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;700&family=Poppins:wght@700&family=Sedgwick+Ave+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
</head>
<body>
    <div class="bg" aria-hidden="true"></div>

    <main class="page">
        <section class="card card-tall" data-name="Sign Up 1">
            <div class="container center gap-75">
                <!-- Back placeholder (hidden on welcome) -->
                <button class="back" style="opacity:0; pointer-events:none" aria-hidden="true" tabindex="-1">
                    <svg width="18" height="30" viewBox="0 0 18 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 14.9915C0 15.2851 0.0530452 15.5562 0.159136 15.8046C0.277014 16.0531 0.453831 16.2902 0.689587 16.5161L14.4637 29.4241C14.8644 29.808 15.3477 30 15.9136 30C16.3026 30 16.6503 29.9097 16.9568 29.729C17.275 29.5596 17.5285 29.3224 17.7171 29.0175C17.9057 28.7239 18 28.3964 18 28.035C18 27.4929 17.7819 27.013 17.3458 26.5951L4.9332 14.9915L17.3458 3.38792C17.7819 2.97007 18 2.49577 18 1.96499C18 1.59232 17.9057 1.25918 17.7171 0.965556C17.5285 0.671937 17.275 0.440429 16.9568 0.271033C16.6503 0.0903444 16.3026 0 15.9136 0C15.3477 0 14.8644 0.186335 14.4637 0.559006L0.689587 13.467C0.453831 13.6928 0.277014 13.93 0.159136 14.1784C0.0530452 14.4269 0 14.6979 0 14.9915Z" fill="#fff"/>
                    </svg>
                </button>

                <div class="center gap-30" style="display:flex; flex-direction:column; width:100%;">
                    <img src="{% static 'img/logo-green.png' %}" alt="Alechemy" width="204" height="204" style="display:block; margin: 0 auto;" />

                    <div class="center" style="display:flex; flex-direction:column; gap:11px;">
                        <p class="big-welcome">
                            <span>{% trans "Вітаємо в" %} </span><span class="brand">Alechemy</span>
                        </p>
                        <p class="subtitle" style="color: var(--text);">{% trans "Оберіть спосіб реєстрації" %}</p>
                    </div>

                    <div class="w-full" style="display:flex; flex-direction:column; gap:14px;">
                        <button class="btn-social" type="button" aria-label="Продовжити з Google">
                            <svg width="20" height="20" viewBox="0 0 18.1739 19" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <defs>
                                    <clipPath id="gclip1">
                                        <rect fill="white" height="19" rx="9.08696" width="18.1739" />
                                    </clipPath>
                                </defs>
                                <g clip-path="url(#gclip1)">
                                    <path d="M18.1739 9.7105C18.1739 8.93163 18.112 8.36326 17.9782 7.77384H9.2724V11.2893H14.3825C14.2795 12.1629 13.7232 13.4786 12.4868 14.3627L12.4695 14.4804L15.2221 16.6589L15.4128 16.6783C17.1642 15.0258 18.1739 12.5944 18.1739 9.7105" fill="#4285F4"/>
                                    <path d="M9.2724 18.9729C11.7759 18.9729 13.8776 18.1308 15.4128 16.6783L12.4868 14.3627C11.7038 14.9205 10.6529 15.31 9.2724 15.31C6.82038 15.31 4.73926 13.6575 3.9974 11.3735L3.88866 11.383L1.02646 13.6459L0.989033 13.7522C2.51381 16.8467 5.64583 18.9729 9.2724 18.9729Z" fill="#34A853"/>
                                    <path d="M3.9974 11.3735C3.80165 10.7841 3.68836 10.1525 3.68836 9.5C3.68836 8.84739 3.80165 8.21589 3.9871 7.62647L3.98191 7.50094L1.08385 5.20162L0.989033 5.2477C0.360597 6.53181 0 7.97382 0 9.5C0 11.0262 0.360597 12.4681 0.989033 13.7522L3.9974 11.3735" fill="#FBBC05"/>
                                    <path d="M9.2724 3.68996C11.0135 3.68996 12.188 4.45831 12.8577 5.1004L15.4746 2.49009C13.8674 0.963907 11.7759 0.0271429 9.2724 0.0271429C5.64583 0.0271429 2.51381 2.15326 0.989033 5.2477L3.9871 7.62647C4.73926 5.34246 6.82038 3.68996 9.2724 3.68996" fill="#EB4335"/>
                                </g>
                            </svg>
                            <span style="font-size:16px; font-weight:600;">{% trans "Продовжити з Google" %}</span>
                        </button>

                        <button class="btn-social" type="button" aria-label="Продовжити з Apple">
                            <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <path d="M15.8169 10.534C15.8081 8.90076 16.537 7.668 18.0122 6.76012C17.1868 5.56297 15.9399 4.90432 14.2934 4.77526C12.7348 4.65065 11.0313 5.69648 10.4078 5.69648C9.74925 5.69648 8.23891 4.81976 7.05347 4.81976C4.60357 4.85981 2 6.80018 2 10.7477C2 11.9137 2.21074 13.1182 2.63223 14.3614C3.19422 15.9947 5.22263 20 7.33886 19.9332C8.44527 19.9065 9.22678 19.1366 10.6669 19.1366C12.063 19.1366 12.7875 19.9332 14.0212 19.9332C16.155 19.9021 17.9902 16.2617 18.5259 14.6239C15.6633 13.2577 15.8169 10.6186 15.8169 10.534V10.534ZM13.3319 3.22652C14.5305 1.7846 14.4207 0.47174 14.3856 0C13.3275 0.0623053 12.1026 0.729862 11.4045 1.55318C10.6361 2.43436 10.1839 3.5247 10.2805 4.753C11.4264 4.84201 12.4714 4.24566 13.3319 3.22652V3.22652Z" fill="#fff"/>
                            </svg>
                            <span style="font-size:16px; font-weight:600;">{% trans "Продовжити з Apple" %}</span>
                        </button>

                        <a class="btn-social" href="{% url 'accounts:signup' %}" aria-label="Продовжити з Email">
                            <svg width="20" height="20" viewBox="0 0 18 14.8235" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M13.4451 0C14.652 0 15.813 0.436471 16.6671 1.21965C17.5221 2.00118 18 3.05529 18 4.15882V10.6647C18 12.9624 15.957 14.8235 13.4451 14.8235H4.554C2.0421 14.8235 0 12.9624 0 10.6647V4.15882C0 1.86118 2.0331 0 4.554 0H13.4451ZM14.8771 5.38587L14.9491 5.31999C15.1642 5.08117 15.1642 4.73528 14.9392 4.49646C14.8141 4.37375 14.6422 4.29881 14.4631 4.28234C14.2741 4.27328 14.0941 4.33175 13.9582 4.44705L9.90014 7.41176C9.37814 7.80787 8.63024 7.80787 8.10014 7.41176L4.05014 4.44705C3.77024 4.25764 3.38324 4.28234 3.15014 4.5047C2.90714 4.72705 2.88014 5.08117 3.08624 5.32823L3.20414 5.43528L7.29914 8.35881C7.80314 8.72117 8.41424 8.91881 9.05414 8.91881C9.69224 8.91881 10.3141 8.72117 10.8172 8.35881L14.8771 5.38587Z" fill="#fff"/>
                            </svg>
                            <span style="font-size:16px; font-weight:600;">{% trans "Продовжити з Email" %}</span>
                        </a>
                    </div>

                    <a class="link" href="{% url 'accounts:login' %}">
                        {% trans "Вже маєш акаунт?" %} <u><b>{% trans "Увійти" %}</b></u>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
